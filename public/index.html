<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Video Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .supported-platforms {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .supported-platforms h3 {
            font-size: 0.9em;
            color: #555;
            margin-bottom: 10px;
        }

        .platforms {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .platform-tag {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8em;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #555;
        }

        .result {
            margin-top: 30px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .video-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .video-info h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .video-info p {
            color: #666;
            margin-bottom: 5px;
        }

        .thumbnail {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        .download-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .download-btn {
            background: #28a745;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            text-align: center;
            font-weight: 600;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background: #218838;
        }

        .loading {
            text-align: center;
            color: #667eea;
            margin-top: 20px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 Video Downloader</h1>
        <p class="subtitle">Download videos from multiple platforms with ease</p>

        <div class="supported-platforms">
            <h3>Supported Platforms:</h3>
            <div class="platforms">
                <span class="platform-tag">YouTube</span>
                <span class="platform-tag">Instagram</span>
                <span class="platform-tag">Twitter/X</span>
                <span class="platform-tag">Facebook</span>
                <span class="platform-tag">TikTok</span>
                <span class="platform-tag">Vimeo</span>
                <span class="platform-tag">Reddit</span>
                <span class="platform-tag">And more...</span>
            </div>
        </div>

        <div class="input-group">
            <label for="videoUrl">Enter Video URL:</label>
            <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." />
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="fetchVideo()">Get Video Info</button>
            <button class="btn-secondary" onclick="clearForm()">Clear</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching video information...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <div class="video-info" id="videoInfo"></div>
            <div class="download-options" id="downloadOptions"></div>
        </div>
    </div>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('videoUrl').value.trim();

            if (!url) {
                showError('Please enter a video URL');
                return;
            }

            // Validate URL
            try {
                new URL(url);
            } catch (e) {
                showError('Please enter a valid URL');
                return;
            }

            hideElements();
            document.getElementById('loading').classList.add('show');

            try {
                const response = await fetch('/api/video-info', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to fetch video information');
                }

                displayVideoInfo(data);
            } catch (error) {
                showError(error.message);
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        }

        function displayVideoInfo(data) {
            const videoInfo = document.getElementById('videoInfo');
            const downloadOptions = document.getElementById('downloadOptions');

            let infoHtml = `
                <h3>${escapeHtml(data.title)}</h3>
                ${data.author ? `<p><strong>Author:</strong> ${escapeHtml(data.author)}</p>` : ''}
                ${data.duration ? `<p><strong>Duration:</strong> ${formatDuration(data.duration)}</p>` : ''}
                ${data.platform ? `<p><strong>Platform:</strong> ${escapeHtml(data.platform)}</p>` : ''}
            `;

            if (data.thumbnail) {
                infoHtml += `<img src="${escapeHtml(data.thumbnail)}" class="thumbnail" alt="Video thumbnail">`;
            }

            videoInfo.innerHTML = infoHtml;

            let optionsHtml = '<h3>Download Options:</h3>';

            if (data.formats && data.formats.length > 0) {
                data.formats.forEach((format, index) => {
                    const quality = format.quality || format.format || `Format ${index + 1}`;
                    const size = format.filesize ? ` (${formatFileSize(format.filesize)})` : '';
                    optionsHtml += `
                        <a href="${escapeHtml(format.url)}"
                           class="download-btn"
                           download
                           target="_blank">
                            📥 Download ${escapeHtml(quality)}${size}
                        </a>
                    `;
                });
            } else if (data.url) {
                optionsHtml += `
                    <a href="${escapeHtml(data.url)}"
                       class="download-btn"
                       download
                       target="_blank">
                        📥 Download Video
                    </a>
                `;
            }

            downloadOptions.innerHTML = optionsHtml;
            document.getElementById('result').classList.add('show');
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        function hideElements() {
            document.getElementById('result').classList.remove('show');
            document.getElementById('error').classList.remove('show');
        }

        function clearForm() {
            document.getElementById('videoUrl').value = '';
            hideElements();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDuration(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;

            if (hours > 0) {
                return `${hours}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }
            return `${minutes}:${String(secs).padStart(2, '0')}`;
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Allow Enter key to submit
        document.getElementById('videoUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                fetchVideo();
            }
        });
    </script>
</body>
</html>
